<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>经典小游戏集合</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        h1 {
            text-align: center;
            font-size: 3em;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 50px;
            font-size: 1.2em;
        }
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            padding: 20px;
        }
        .game-card {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            position: relative;
            overflow: hidden;
        }
        .game-card:hover {
            transform: translateY(-10px);
            border-color: #00d9ff;
            box-shadow: 0 20px 40px rgba(0,217,255,0.2);
        }
        .game-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
        }
        .game-icon {
            font-size: 4em;
            margin-bottom: 20px;
        }
        .game-title {
            font-size: 1.5em;
            margin-bottom: 10px;
            color: #fff;
        }
        .game-desc {
            color: #888;
            font-size: 0.9em;
        }
        .back-home {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(255,255,255,0.1);
            border: none;
            color: #fff;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
            display: none;
            z-index: 100;
        }
        .back-home:hover {
            background: rgba(255,255,255,0.2);
        }
        .back-home.show {
            display: block;
        }
        iframe {
            display: none;
            width: 100%;
            height: 100vh;
            border: none;
            position: fixed;
            top: 0;
            left: 0;
        }
        iframe.show {
            display: block;
        }
    </style>
</head>
<body>
    <button class="back-home" onclick="goHome()">返回首页</button>
    
    <div class="container" id="home">
        <h1>经典小游戏集合</h1>
        <p class="subtitle">使用 HTML + CSS + JavaScript 实现的经典游戏</p>
        
        <div class="game-grid">
            <div class="game-card" onclick="loadGame('tic-tac-toe.html')">
                <div class="game-icon">⭕</div>
                <h2 class="game-title">井字棋</h2>
                <p class="game-desc">与电脑对战的经典三子棋游戏</p>
            </div>
            
            <div class="game-card" onclick="loadGame('snake.html')">
                <div class="game-icon">🐍</div>
                <h2 class="game-title">贪吃蛇</h2>
                <p class="game-desc">控制蛇吃食物，越吃越长</p>
            </div>
            
            <div class="game-card" onclick="loadGame('2048.html')">
                <div class="game-icon">🎮</div>
                <h2 class="game-title">2048</h2>
                <p class="game-desc">滑动方块，合成2048</p>
            </div>
            
            <div class="game-card" onclick="loadGame('breakout.html')">
                <div class="game-icon">🏆</div>
                <h2 class="game-title">打砖块</h2>
                <p class="game-desc">用球拍击碎所有砖块</p>
            </div>
            
            <div class="game-card" onclick="loadGame('pong.html')">
                <div class="game-icon">🏓</div>
                <h2 class="game-title">弹跳球</h2>
                <p class="game-desc">经典的乒乓球对战游戏</p>
            </div>
            
            <div class="game-card" onclick="loadGame('flappy.html')">
                <div class="game-icon">🐦</div>
                <h2 class="game-title">Flappy Bird</h2>
                <p class="game-desc">点击躲避障碍物</p>
            </div>
        </div>
    </div>
    
    <iframe id="gameFrame"></iframe>
    
    <script>
        function loadGame(src) {
            document.getElementById('home').style.display = 'none';
            document.getElementById('gameFrame').src = src;
            document.getElementById('gameFrame').classList.add('show');
            document.querySelector('.back-home').classList.add('show');
        }
        
        function goHome() {
            document.getElementById('home').style.display = 'block';
            document.getElementById('gameFrame').classList.remove('show');
            document.getElementById('gameFrame').src = '';
            document.querySelector('.back-home').classList.remove('show');
        }
    </script>
</body>
</html>
