<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>井字棋</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        h1 { color: #fff; margin-bottom: 20px; font-size: 2.5em; }
        .status { color: #fff; margin-bottom: 20px; font-size: 1.5em; }
        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 10px;
        }
        .cell {
            background: rgba(255,255,255,0.9);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        .cell:hover { transform: scale(1.05); box-shadow: 0 5px 20px rgba(0,0,0,0.2); }
        .cell.taken { cursor: not-allowed; }
        .x { color: #ff6b6b; }
        .o { color: #4ecdc4; }
        .btn {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 1.2em;
            background: #fff;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover { transform: scale(1.1); box-shadow: 0 5px 20px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
    <h1>井字棋</h1>
    <p class="status" id="status">轮到 X</p>
    <div class="board" id="board"></div>
    <button class="btn" onclick="resetGame()">重新开始</button>
    
    <script>
        let currentPlayer = 'X';
        let gameActive = true;
        let board = ['', '', '', '', '', '', '', '', ''];
        
        const winPatterns = [
            [0,1,2], [3,4,5], [6,7,8],
            [0,3,6], [1,4,7], [2,5,8],
            [0,4,8], [2,4,6]
        ];
        
        function init() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            board.forEach((_, i) => {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.onclick = () => handleClick(i);
                boardEl.appendChild(cell);
            });
        }
        
        function handleClick(index) {
            if (board[index] || !gameActive) return;
            
            board[index] = currentPlayer;
            updateBoard();
            
            if (checkWin()) {
                document.getElementById('status').textContent = `${currentPlayer} 获胜!`;
                gameActive = false;
            } else if (board.every(cell => cell)) {
                document.getElementById('status').textContent = '平局!';
                gameActive = false;
            } else {
                currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
                document.getElementById('status').textContent = `轮到 ${currentPlayer}`;
            }
        }
        
        function updateBoard() {
            const cells = document.querySelectorAll('.cell');
            cells.forEach((cell, i) => {
                cell.textContent = board[i];
                cell.className = 'cell' + (board[i] ? ' taken ' + board[i].toLowerCase() : '');
            });
        }
        
        function checkWin() {
            return winPatterns.some(pattern => 
                pattern.every(i => board[i] === currentPlayer)
            );
        }
        
        function resetGame() {
            board = ['', '', '', '', '', '', '', '', ''];
            currentPlayer = 'X';
            gameActive = true;
            document.getElementById('status').textContent = '轮到 X';
            updateBoard();
        }
        
        init();
    </script>
</body>
</html>
