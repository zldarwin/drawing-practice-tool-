<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
        }
        h1 { color: #fff; margin-bottom: 10px; font-size: 2.5em; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .score-board { color: #fff; font-size: 1.5em; margin-bottom: 15px; }
        canvas {
            background: #1a1a2e;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        .controls { color: #fff; margin-top: 20px; text-align: center; }
        .controls p { margin: 5px 0; opacity: 0.8; }
        .btn {
            margin-top: 15px;
            padding: 12px 30px;
            font-size: 1.1em;
            background: #fff;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover { transform: scale(1.05); }
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.85);
            padding: 40px 60px;
            border-radius: 20px;
            text-align: center;
            display: none;
        }
        .game-over h2 { color: #ff6b6b; font-size: 2em; margin-bottom: 15px; }
        .game-over p { color: #fff; font-size: 1.3em; margin-bottom: 20px; }
        .wrapper { position: relative; }
    </style>
</head>
<body>
    <h1>贪吃蛇</h1>
    <p class="score-board">得分: <span id="score">0</span></p>
    <div class="wrapper">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="game-over" id="gameOver">
            <h2>游戏结束!</h2>
            <p>最终得分: <span id="finalScore">0</span></p>
            <button class="btn" onclick="resetGame()">再玩一次</button>
        </div>
    </div>
    <div class="controls">
        <p>使用 ↑ ↓ ← → 或 W A S D 控制方向</p>
        <p>手机端可使用屏幕按钮</p>
        <button class="btn" onclick="resetGame()">重新开始</button>
    </div>
    
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        
        let snake = [];
        let food = {};
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let score = 0;
        let gameActive = true;
        let gameSpeed = 100;
        let lastTime = 0;
        
        function init() {
            snake = [
                { x: 5, y: 10 },
                { x: 4, y: 10 },
                { x: 3, y: 10 }
            ];
            placeFood();
            score = 0;
            document.getElementById('score').textContent = score;
            gameActive = true;
            document.getElementById('gameOver').style.display = 'none';
        }
        
        function placeFood() {
            food = {
                x: Math.floor(Math.random() * tileCount),
                y: Math.floor(Math.random() * tileCount)
            };
            snake.forEach(segment => {
                if (segment.x === food.x && segment.y === food.y) {
                    placeFood();
                }
            });
        }
        
        function draw() {
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#4ecdc4';
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#4ecdc4';
            snake.forEach((segment, i) => {
                ctx.fillRect(
                    segment.x * gridSize + 2,
                    segment.y * gridSize + 2,
                    gridSize - 4,
                    gridSize - 4
                );
            });
            ctx.shadowBlur = 0;
            
            ctx.fillStyle = '#ff6b6b';
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#ff6b6b';
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize/2,
                food.y * gridSize + gridSize/2,
                gridSize/2 - 3,
                0,
                Math.PI * 2
            );
            ctx.fill();
            ctx.shadowBlur = 0;
        }
        
        function update() {
            direction = nextDirection;
            const head = {
                x: snake[0].x + direction.x,
                y: snake[0].y + direction.y
            };
            
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }
            
            for (let segment of snake) {
                if (head.x === segment.x && head.y === segment.y) {
                    gameOver();
                    return;
                }
            }
            
            snake.unshift(head);
            
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('score').textContent = score;
                placeFood();
                if (gameSpeed > 50) gameSpeed -= 2;
            } else {
                snake.pop();
            }
        }
        
        function gameOver() {
            gameActive = false;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').style.display = 'block';
        }
        
        function gameLoop(currentTime) {
            requestAnimationFrame(gameLoop);
            if (currentTime - lastTime >= gameSpeed) {
                lastTime = currentTime;
                if (gameActive) {
                    update();
                    draw();
                }
            }
        }
        
        function handleKey(e) {
            switch(e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
                    break;
            }
        }
        
        function resetGame() {
            init();
            draw();
        }
        
        document.addEventListener('keydown', handleKey);
        init();
        draw();
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
