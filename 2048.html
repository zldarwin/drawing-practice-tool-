<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #ed2136 0%, #93291e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
        }
        h1 { color: #fff; margin-bottom: 10px; font-size: 2.5em; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .score-board { color: #fff; font-size: 1.3em; margin-bottom: 20px; }
        .score-board span { font-weight: bold; }
        .game-container {
            background: #bbada0;
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 80px);
            grid-template-rows: repeat(4, 80px);
            gap: 10px;
        }
        .cell {
            background: rgba(238, 228, 218, 0.35);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8em;
            font-weight: bold;
            color: #776e65;
            transition: all 0.1s;
        }
        .cell[data-value="2"] { background: #eee4da; color: #776e65; }
        .cell[data-value="4"] { background: #ede0c8; color: #776e65; }
        .cell[data-value="8"] { background: #f2b179; color: #f9f6f2; }
        .cell[data-value="16"] { background: #f59563; color: #f9f6f2; }
        .cell[data-value="32"] { background: #f67c5f; color: #f9f6f2; }
        .cell[data-value="64"] { background: #f65e3b; color: #f9f6f2; }
        .cell[data-value="128"] { background: #edcf72; color: #f9f6f2; font-size: 1.5em; }
        .cell[data-value="256"] { background: #edcc61; color: #f9f6f2; font-size: 1.5em; }
        .cell[data-value="512"] { background: #edc850; color: #f9f6f2; font-size: 1.5em; }
        .cell[data-value="1024"] { background: #edc53f; color: #f9f6f2; font-size: 1.3em; }
        .cell[data-value="2048"] { background: #edc22e; color: #f9f6f2; font-size: 1.3em; }
        .cell[data-value="super"] { background: #3c3a32; color: #f9f6f2; font-size: 1em; }
        .controls { color: #fff; margin-top: 20px; text-align: center; }
        .controls p { margin: 5px 0; opacity: 0.8; }
        .btn {
            margin-top: 15px;
            padding: 12px 30px;
            font-size: 1.1em;
            background: #fff;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover { transform: scale(1.05); }
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(238, 228, 218, 0.9);
            padding: 40px 60px;
            border-radius: 15px;
            text-align: center;
            display: none;
        }
        .game-over h2 { color: #776e65; font-size: 2em; margin-bottom: 15px; }
        .game-over p { color: #776e65; font-size: 1.2em; margin-bottom: 20px; }
        .wrapper { position: relative; }
    </style>
</head>
<body>
    <h1>2048</h1>
    <p class="score-board">得分: <span id="score">0</span></p>
    <div class="wrapper">
        <div class="game-container">
            <div class="grid" id="grid"></div>
        </div>
        <div class="game-over" id="gameOver">
            <h2>游戏结束!</h2>
            <p>得分: <span id="finalScore">0</span></p>
            <button class="btn" onclick="resetGame()">再来一局</button>
        </div>
    </div>
    <div class="controls">
        <p>使用 ↑ ↓ ← → 或 W A S D 滑动方块</p>
        <button class="btn" onclick="resetGame()">重新开始</button>
    </div>
    
    <script>
        const grid = [];
        let score = 0;
        const gridEl = document.getElementById('grid');
        
        function init() {
            grid.length = 0;
            gridEl.innerHTML = '';
            score = 0;
            document.getElementById('score').textContent = score;
            document.getElementById('gameOver').style.display = 'none';
            
            for (let i = 0; i < 16; i++) {
                grid.push(0);
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.id = 'cell-' + i;
                gridEl.appendChild(cell);
            }
            
            addRandomTile();
            addRandomTile();
            updateDisplay();
        }
        
        function addRandomTile() {
            const empty = [];
            grid.forEach((val, i) => { if (val === 0) empty.push(i); });
            if (empty.length > 0) {
                grid[empty[Math.floor(Math.random() * empty.length)]] = Math.random() < 0.9 ? 2 : 4;
            }
        }
        
        function updateDisplay() {
            grid.forEach((val, i) => {
                const cell = document.getElementById('cell-' + i);
                cell.textContent = val || '';
                cell.dataset.value = val || '';
            });
        }
        
        function slide(row) {
            let arr = row.filter(v => v);
            let missing = 4 - arr.length;
            let zeros = Array(missing).fill(0);
            return arr.concat(zeros);
        }
        
        function combine(row) {
            for (let i = 0; i < 3; i++) {
                if (row[i] && row[i] === row[i+1]) {
                    row[i] *= 2;
                    score += row[i];
                    row[i+1] = 0;
                }
            }
            return row;
        }
        
        function rotateGrid(times) {
            for (let t = 0; t < times; t++) {
                let newGrid = [];
                for (let i = 0; i < 4; i++) {
                    for (let j = 0; j < 4; j++) {
                        newGrid[i*4+j] = grid[(3-j)*4+i];
                    }
                }
                grid.length = 0;
                grid.push(...newGrid);
            }
        }
        
        function move(dx, dy) {
            const rotations = { 'up': 1, 'down': 3, 'left': 0, 'right': 2 };
            rotateGrid(rotations[dy === -1 ? 'up' : dy === 1 ? 'down' : dx === -1 ? 'left' : 'right']);
            
            let moved = false;
            for (let i = 0; i < 4; i++) {
                let row = [grid[i*4], grid[i*4+1], grid[i*4+2], grid[i*4+3]];
                let newRow = slide(combine(slide(row)));
                if (row.join() !== newRow.join()) moved = true;
                grid[i*4] = newRow[0];
                grid[i*4+1] = newRow[1];
                grid[i*4+2] = newRow[2];
                grid[i*4+3] = newRow[3];
            }
            
            const reverse = { 'up': 3, 'down': 1, 'left': 2, 'right': 0 };
            rotateGrid(reverse[dy === -1 ? 'up' : dy === 1 ? 'down' : dx === -1 ? 'left' : 'right']);
            
            if (moved) {
                document.getElementById('score').textContent = score;
                addRandomTile();
                updateDisplay();
                
                if (grid.every(v => v > 0)) {
                    document.getElementById('finalScore').textContent = score;
                    document.getElementById('gameOver').style.display = 'block';
                }
            }
        }
        
        function handleKey(e) {
            const keyMap = {
                'ArrowUp': [0, -1], 'w': [0, -1], 'W': [0, -1],
                'ArrowDown': [0, 1], 's': [0, 1], 'S': [0, 1],
                'ArrowLeft': [-1, 0], 'a': [-1, 0], 'A': [-1, 0],
                'ArrowRight': [1, 0], 'd': [1, 0], 'D': [1, 0]
            };
            if (keyMap[e.key]) {
                e.preventDefault();
                const [dx, dy] = keyMap[e.key];
                move(dx, dy);
            }
        }
        
        let touchStartX, touchStartY;
        document.addEventListener('touchstart', e => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });
        document.addEventListener('touchend', e => {
            if (!touchStartX) return;
            const dx = e.changedTouches[0].clientX - touchStartX;
            const dy = e.changedTouches[0].clientY - touchStartY;
            if (Math.abs(dx) > Math.abs(dy)) {
                move(dx > 0 ? 1 : -1, 0);
            } else {
                move(0, dy > 0 ? 1 : -1);
            }
            touchStartX = touchStartY = null;
        });
        
        document.addEventListener('keydown', handleKey);
        init();
        
        function resetGame() { init(); }
    </script>
</body>
</html>
